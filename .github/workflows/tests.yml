name: tests

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest fastapi httpx pydantic numpy pandas pyarrow pillow pydicom tifffile requests
      - name: Run non-GPU tests
        run: pytest -m "not gpu"
